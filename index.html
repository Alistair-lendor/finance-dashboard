<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>财务 · Alistair</title>
<style>
@font-face{font-family:'Geist';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/geist-sans/Geist-Variable.woff2') format('woff2');font-weight:100 900;font-display:swap}
@font-face{font-family:'Geist Mono';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/geist-mono/GeistMono-Variable.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--bg:#fff;--fg:#171717;--fg2:#4d4d4d;--fg3:#666;--fg4:#808080;--line:#ebebeb;--surface:#fafafa;--f:'Geist',Arial,sans-serif;--fm:'Geist Mono',ui-monospace,monospace;--font-features:"liga","tnum";--shadow-border:0 0 0 1px rgba(0,0,0,.08);--shadow-elevation:0 2px 2px rgba(0,0,0,.04);--shadow-ambient:0 8px 8px -8px rgba(0,0,0,.04);--shadow-glow:#fafafa 0 0 0 1px;--shadow-card:var(--shadow-border),var(--shadow-elevation),var(--shadow-ambient),var(--shadow-glow);--shadow-divider:0 1px 0 0 rgba(0,0,0,.08);--focus:hsla(212,100%,48%,1);--selection:hsla(0,0%,95%,1)}
@media(prefers-color-scheme:dark){:root{--bg:#000;--fg:#ededed;--fg2:#888;--fg3:#666;--fg4:#555;--line:#222;--surface:#111;--shadow-border:0 0 0 1px rgba(255,255,255,.08);--shadow-elevation:0 2px 2px rgba(255,255,255,.04);--shadow-ambient:0 8px 8px -8px rgba(255,255,255,.04);--shadow-glow:#111 0 0 0 1px;--shadow-divider:0 1px 0 0 rgba(255,255,255,.08)}}
*{margin:0;padding:0;box-sizing:border-box;font-feature-settings:var(--font-features)}
::selection{background:var(--selection)}
html,body{height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;line-height:1.5;max-width:520px;margin:0 auto;padding:0 20px}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:6px}
a{color:inherit;text-decoration:none}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 0 16px;box-shadow:var(--shadow-divider)}
.hdr-l{font-size:1.5rem;font-weight:600;letter-spacing:-1.28px;line-height:1.2;cursor:pointer;transition:opacity .12s}
.hdr-l:hover{opacity:.7}
.hdr-r{font-size:.82rem;font-weight:400;color:var(--fg3);font-family:var(--fm);letter-spacing:-.02em}

.st{font-size:.82rem;font-weight:500;color:var(--fg4);text-transform:uppercase;letter-spacing:.8px;padding-top:24px;padding-bottom:12px;box-shadow:var(--shadow-divider)}

.card{padding:20px;border-radius:8px;box-shadow:var(--shadow-card);margin-bottom:16px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.row+.row{border-top:1px solid var(--line)}
.rl{font-size:.88rem;font-weight:400;color:var(--fg2)}
.rv{font-family:var(--fm);font-size:1.1rem;font-weight:600;letter-spacing:-.48px}
.rv.sm{font-size:.88rem;font-weight:500}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.two>div{padding:16px;border-radius:8px;box-shadow:var(--shadow-card)}
.two .tl{font-size:.72rem;font-weight:400;color:var(--fg4);margin-bottom:4px;letter-spacing:-.01em}
.two .tv{font-family:var(--fm);font-size:1.1rem;font-weight:600;letter-spacing:-.48px}
.tag{display:inline-block;font-size:.72rem;font-weight:500;padding:2px 10px;border-radius:8px;background:var(--surface);color:var(--fg3);box-shadow:var(--shadow-border)}

.ft{text-align:center;font-size:.72rem;color:var(--fg4);padding:24px 0 32px;border-top:1px solid var(--line);margin-top:16px}
.ft a{text-decoration:underline;text-underline-offset:2px}
.ft a:hover{opacity:.7}
</style>
</head>
<body>
<div class="hdr"><a href="https://alistairlendor.com" class="hdr-l">Alistair</a><span class="hdr-r">财务</span></div>

<div class="st">可用余额</div>
<div class="card" style="text-align:center;padding:24px">
  <div style="font-size:.82rem;color:var(--fg4);margin-bottom:8px">截至 2026年6月22日</div>
  <div style="font-family:var(--fm);font-size:2.5rem;font-weight:700;letter-spacing:-1.6px;line-height:1">¥1,231</div>
</div>

<div class="st">月度概览</div>
<div class="two">
  <div><div class="tl">收入</div><div class="tv" style="color:var(--fg)">¥6,517</div></div>
  <div><div class="tl">支出</div><div class="tv" style="color:var(--fg)">¥3,798</div></div>
</div>
<div class="row" style="padding:12px 0;border-top:1px solid var(--line)"><span class="rl" style="font-weight:500;color:var(--fg)">净结余</span><span class="rv" style="font-size:1.1rem">+¥2,720</span></div>

<div class="st">日常预算</div>
<div class="card">
  <div class="row"><span class="rl">已使用</span><span class="rv sm">¥2,939 <span style="font-weight:400;color:var(--fg4)">/ ¥3,000</span></span></div>
  <div style="height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin:8px 0">
    <div style="width:98%;height:100%;background:var(--fg);border-radius:3px"></div>
  </div>
  <div class="row" style="border:none"><span class="rl" style="font-size:.75rem">剩余</span><span class="rv sm" style="color:var(--fg4)">¥61</span></div>
</div>

<div class="st">固定支出</div>
<div class="card" style="padding:12px 16px">
  <div class="row" style="padding:8px 0"><span class="rl">房贷</span><span class="rv" style="font-size:.92rem">¥4,581</span></div>
  <div class="row" style="padding:8px 0"><span class="rl">车位贷</span><span class="rv" style="font-size:.92rem">¥1,091</span></div>
  <div class="row" style="border:none;padding:8px 0"><span class="rl">物业费</span><span class="rv" style="font-size:.92rem">¥145</span></div>
</div>

<div class="st">消费债务</div>
<div class="card" style="padding:12px 16px">
  <div class="row" style="padding:8px 0"><span class="rl">1688先采后付 <span class="tag" style="font-size:.65rem">月清</span></span><span class="rv sm">¥658</span></div>
  <div class="row" style="padding:8px 0"><span class="rl">花呗 <span class="tag" style="font-size:.65rem">月清</span></span><span class="rv sm">¥225</span></div>
  <div class="row" style="border:none;padding:8px 0"><span class="rl">工商银行信用卡 <span class="tag" style="font-size:.65rem">分期中</span></span><span class="rv sm">¥521</span></div>
</div>

<div class="st">租房基金</div>
<div class="card" style="padding:12px 16px;text-align:center">
  <div style="font-size:.82rem;color:var(--fg4);margin-bottom:4px">押一付六 · 6月起自行储存</div>
  <div style="font-family:var(--fm);font-size:1.5rem;font-weight:600;letter-spacing:-.64px">¥1,750 / 月</div>
</div>

<div class="ft">Built with <a href="#">WorkBuddy</a> · <a href="#">Alistair Lendor</a></div>
</body>
</html>
